name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend-lint:
    name: Backend — lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zero-knowledge-vault/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: zero-knowledge-vault/backend/requirements.txt

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check .

  backend-typecheck:
    name: Backend — type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zero-knowledge-vault/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: zero-knowledge-vault/backend/requirements.txt

      - name: Install dependencies + mypy
        run: |
          pip install -r requirements.txt
          pip install mypy types-PyYAML

      - name: Type check
        run: mypy . --ignore-missing-imports --exclude venv --exclude alembic

  backend-test:
    name: Backend — test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zero-knowledge-vault/backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: vault_test
          POSTGRES_USER: vault_user
          POSTGRES_PASSWORD: vault_password
        options: >-
          --health-cmd "pg_isready -U vault_user -d vault_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: zero-knowledge-vault/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://vault_user:vault_password@localhost:5432/vault_test
          JWT_SECRET_KEY: ci-jwt-secret-for-tests-only-minimum-required-length-32chars
          MFA_ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          ENVIRONMENT: test
          ADMIN_API_KEY: ci-admin-key
          CORS_ORIGINS: http://localhost:3000
        run: python -m pytest --cov=. --cov-report=term-missing --cov-report=xml -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: zero-knowledge-vault/backend/coverage.xml
          flags: backend

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend — lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zero-knowledge-vault

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: zero-knowledge-vault/package-lock.json

      - run: npm ci
      - run: npm run lint

  frontend-typecheck:
    name: Frontend — type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zero-knowledge-vault

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: zero-knowledge-vault/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit

  frontend-test:
    name: Frontend — test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zero-knowledge-vault

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: zero-knowledge-vault/package-lock.json

      - run: npm ci
      - run: npm test

  # ── Docker build ─────────────────────────────────────────────────────────────
  docker-build:
    name: Docker — build images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: zero-knowledge-vault/backend
          file: zero-knowledge-vault/backend/Dockerfile
          target: runner
          push: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: zero-knowledge-vault
          file: zero-knowledge-vault/Dockerfile
          target: runner
          push: false
          build-args: |
            NEXT_PUBLIC_API_URL=/api/v1
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
