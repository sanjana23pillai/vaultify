services:
  - type: web
    name: vaultify-api
    runtime: docker
    dockerfilePath: ./zero-knowledge-vault/backend/Dockerfile
    dockerContext: ./zero-knowledge-vault/backend
    startCommand: "sh -c 'alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2'"
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vaultify-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: MFA_ENCRYPTION_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: COOKIE_SECURE
        value: "true"
      - key: CORS_ORIGINS
        sync: false
      - key: REDIS_URL
        sync: false
      - key: ADMIN_API_KEY
        generateValue: true

databases:
  - name: vaultify-db
    plan: free
    databaseName: zk_vault
    user: vault_user
